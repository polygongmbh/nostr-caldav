nostr:
  relays:
    - "wss://relay.damus.io"
    - "wss://nos.lol"
  follow_pubkeys:
    - "npub1replace_me"

  # Unused in NOAS-only mode.
  private_key: null

  # Unused in NOAS-only mode.
  bunker_url: null

  # Required: NOAS integration.
  noas:
    enabled: true
    # For multi-tenant setups, use the tenant URL for each domain.
    base_url: "https://noas.example.com"
    # Optional and ignored in NOAS CalDAV auth mode.
    username: null
    # Change if your NOAS is mounted under a custom base path.
    api_path_prefix: "/api/v1"
    timeout_ms: 10000
    # Required in NOAS-only bridge mode:
    # username=handle (e.g. user@example.com), password=NOAS password.
    caldav_auth_enabled: true
    # Optional per-domain NOAS URL mapping for handle domains.
    domain_base_urls:
      example.com: "https://noas.example.com"
      example.org: "https://noas.example.org"
    # Cache mode: encrypted (recommended) or decrypted
    cache_mode: "encrypted"
    cache_ttl_ms: 300000

caldav:
  host: "::"
  port: 5232
  # Use your public HTTPS hostname when exposing via Caddy.
  base_url: "https://caldav.example.com"
  # Set false to only expose the main "Nostr Issues" calendar.
  include_auto_pubkey_calendars: true

  # Unused in NOAS-only mode; keep placeholders.
  username: "unused"
  password: "unused"

  # Unused in NOAS-only mode.
  principals:
    - username: "unused"
      password: "unused"
      # Restrict this principal to these issue authors (hex or npub)
      pubkeys: []
      # Extra filtered calendars for this principal
      calendars: []

sync:
  poll_interval_seconds: 30
  lookback_days: 90

db:
  path: "./bridge.db"
